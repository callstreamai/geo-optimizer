services:
  - type: web
    name: geo-optimizer
    runtime: python
    buildCommand: pip install -r requirements.txt && python -c "import nltk; nltk.download('punkt'); nltk.download('punkt_tab'); nltk.download('averaged_perceptron_tagger'); nltk.download('stopwords')"
    startCommand: python3 backend/server.py
    healthCheckPath: /api/health
    envVars:
      - key: PYTHONUNBUFFERED
        value: 1
